<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="background:red;color:white;font-family:sans-serif;padding:20px;font-size:16px;">

<div id="status">SCHRITT 1: HTML geladen ✓</div>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

<script>
  document.getElementById("status").textContent += " | SCHRITT 2: nach CDN-Tags";
  window.addEventListener("load", function() {
    var s = document.getElementById("status");
    s.textContent += " | SCHRITT 3: window.load Event";
    s.textContent += " | React=" + typeof React;
    s.textContent += " | ReactDOM=" + typeof ReactDOM;
    s.textContent += " | Babel=" + typeof Babel;
    try {
      var root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement("div", {style:{fontSize:30,marginTop:20}}, "REACT RENDER ERFOLGREICH"));
      s.textContent += " | SCHRITT 4: Render OK ✓";
    } catch(e) {
      s.textContent += " | SCHRITT 4 FEHLER: " + e.message;
    }
  });
  window.addEventListener("error", function(e) {
    document.getElementById("status").textContent += " | GLOBAL ERROR: " + e.message;
  });
</script>

</body>
</html>
